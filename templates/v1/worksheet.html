<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Worksheet Template</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
:root {
  --badge-worksheet: #FF7043;
  --bg-lavender: #F3E5F5;
  --text-primary: #333333;
  --border-writing: 2px solid #333333;
  --font-primary: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-primary); width: 1600px; background: transparent; padding: 40px 20px; }

.activity-container {
  position: relative;
  background: var(--bg-lavender);
  border-radius: 24px;
  padding: 40px 32px 32px 32px;
  margin-top: 20px;
}

.activity-badge {
  position: absolute;
  top: -20px;
  left: 32px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--badge-worksheet);
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  padding: 10px 24px;
  border-radius: 999px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  z-index: 10;
}

.paper {
  background: #fff;
  border: var(--border-writing);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

.paper-header {
  padding: 24px 32px;
  border-bottom: 2px solid #333;
  background: #f9f9f9;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.paper-title {
  font-size: 24px;
  font-weight: 900;
  color: var(--text-primary);
}

.student-info {
  display: flex;
  gap: 16px;
  font-size: 14px;
  color: #666;
}

.answer-line {
  border-bottom: 1.5px solid #333;
  min-width: 80px;
  display: inline-block;
  margin: 0 4px;
  height: 20px;
}

.content {
  padding: 32px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.question-block {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.instruction {
  font-size: 18px;
  font-weight: 500;
  color: #333;
}

.writing-area {
  background: #fff;
  border: var(--border-writing);
  border-radius: 12px;
  min-height: 220px;
  padding: 20px;
  font-size: 18px;
}

.writing-area-small {
  background: #fff;
  border: var(--border-writing);
  border-radius: 10px;
  min-height: 150px;
  padding: 16px;
}

.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

</style>
</head>
<body>
  <div class="activity-container">
    <div class="activity-badge">
      <span>📋</span>
      <span>활동지</span>
    </div>
    
    <div class="paper">
      <div class="paper-header">
        <div class="paper-title">확인 활동지</div>
        <div class="student-info">
          6학년 <span class="answer-line"></span> 반 <span class="answer-line"></span> 번 이름: <span class="answer-line"></span>
        </div>
      </div>
      
      <div class="content">
        <div class="question-block">
          <div class="instruction">● 핵심 개념을 한 문장으로 정리해 봅시다.</div>
          <div class="writing-area-small" contenteditable="true"></div>
        </div>
        
        <div class="question-block">
          <div class="instruction">● 아래 질문에 대해 깊이 생각하여 답해 봅시다.</div>
          <div class="grid-2">
            <div class="writing-area-small" contenteditable="true"></div>
            <div class="writing-area-small" contenteditable="true"></div>
          </div>
        </div>
        
        <div class="question-block">
          <div class="instruction">● 근거를 들어 자신의 생각을 자유롭게 서술해 봅시다.</div>
          <div class="writing-area" contenteditable="true"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
