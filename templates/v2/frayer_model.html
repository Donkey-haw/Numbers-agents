<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Frayer Model Template</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
:root {
  --badge-numbers: #4CAF50;
  --bg-white: #FFFFFF;
  --label-purple: #C5B3E6;
  --label-pink: #F4A5B8;
  --label-blue: #7EC8E3;
  --label-coral: #F5A89A;
  --label-mint: #80F0D0;
  --text-primary: #333333;
  --border-writing: 2px solid #333333;
  --font-primary: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-primary); width: 1600px; background: transparent; padding: 40px 20px; }

.activity-container {
  position: relative;
  background: var(--bg-white);
  border-radius: 24px;
  padding: 60px 32px 32px 32px;
  margin-top: 20px;
  border: 1px solid #EEE;
}

.activity-badge {
  position: absolute;
  top: -20px;
  left: 32px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--badge-numbers);
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  padding: 10px 24px;
  border-radius: 999px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  z-index: 10;
}

.instruction {
  font-size: 18px;
  color: #444;
  margin-bottom: 30px;
  font-weight: 500;
  text-align: center;
}

.frayer-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 24px;
  position: relative;
  min-height: 800px;
}

.frayer-quadrant {
  background: #fff;
  border: var(--border-writing);
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.quadrant-label {
  color: #fff;
  text-align: center;
  font-size: 20px;
  font-weight: 700;
  padding: 14px;
}

.writing-area {
  flex: 1;
  padding: 24px;
  font-size: 18px;
}

.frayer-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--label-mint);
  border: var(--border-writing);
  width: 280px;
  height: 140px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 70px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
  z-index: 5;
}

.center-text {
  font-size: 24px;
  font-weight: 900;
  color: var(--text-primary);
  text-align: center;
}

</style>
</head>
<body>
  <div class="activity-container">
    <div class="activity-badge">
      <span>📊</span>
      <span>Numbers 앱 활동</span>
    </div>
    
    <div class="instruction">● 아래 프레이어 모델을 활용하여 핵심 개념을 분석해 봅시다.</div>
    
    <div class="frayer-grid">
      <div class="frayer-quadrant">
        <div class="quadrant-label" style="background: var(--label-pink);">정의</div>
        <div class="writing-area" contenteditable="true"></div>
      </div>
      <div class="frayer-quadrant">
        <div class="quadrant-label" style="background: var(--label-blue);">성질 / 특성</div>
        <div class="writing-area" contenteditable="true"></div>
      </div>
      
      <div class="frayer-center">
        <div class="center-text">핵심 주제</div>
      </div>
      
      <div class="frayer-quadrant">
        <div class="quadrant-label" style="background: var(--label-purple);">예</div>
        <div class="writing-area" contenteditable="true"></div>
      </div>
      <div class="frayer-quadrant">
        <div class="quadrant-label" style="background: var(--label-coral);">예가 아닌 것</div>
        <div class="writing-area" contenteditable="true"></div>
      </div>
    </div>
  </div>
</body>
</html>
